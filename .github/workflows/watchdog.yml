name: Chuck Watchdog

on:
  schedule:
    - cron: '0 13 * * *'  # 5am PDT (UTC-7) — runs 1 hour after nightly review
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check MC API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.ccxmc.ca/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "::error::MC API is DOWN (HTTP $STATUS)"
            exit 1
          fi
          echo "MC API healthy (HTTP $STATUS)"

      - name: Check nightly review ran
        run: |
          # Check the timestamp file written by the nightly review cron
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" "https://api.ccxmc.ca/health/nightly-review" || echo "000")

          if [ "$RESULT" != "200" ]; then
            echo "::error::Cannot reach nightly review status endpoint (HTTP $RESULT)"
            exit 1
          fi

          RESPONSE=$(curl -s "https://api.ccxmc.ca/health/nightly-review")
          RAN_TODAY=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ranToday', False))" 2>/dev/null || echo "False")
          LAST_RUN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('lastRun', 'unknown'))" 2>/dev/null || echo "unknown")

          echo "Nightly review last ran: $LAST_RUN"
          echo "Ran today: $RAN_TODAY"

          if [ "$RAN_TODAY" != "True" ]; then
            echo "::error::Nightly review did NOT run today. Last run: $LAST_RUN"
            exit 1
          fi

          echo "Nightly review confirmed for today."
